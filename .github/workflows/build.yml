name: Build & Release

on:
  push:
    tags:
      - "v*"
  pull_request:
    branches:
      - main

jobs:
  build:
    name: Build Extension
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Grant execute permission to gradlew
        run: chmod +x gradlew

      - name: Build (debug)
        run: ./gradlew :android:assembleDebug :desktop:shadowJar

      - name: Upload Android APK
        uses: actions/upload-artifact@v4
        with:
          name: android-debug
          path: android/build/outputs/apk/debug/*.apk

      - name: Upload Desktop JAR
        uses: actions/upload-artifact@v4
        with:
          name: desktop-jar
          path: desktop/build/libs/*.jar

  release:
    name: Publish Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Grant execute permission to gradlew
        run: chmod +x gradlew

      - name: Build release
        run: ./gradlew :android:assembleRelease :desktop:shadowJar

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            android/build/outputs/apk/release/*.apk
            desktop/build/libs/*.jar
